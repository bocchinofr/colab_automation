name: Full Intraday Pipeline (Finviz → Intraday → Aggregation → Drive)

on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12

      - name: Install dependencies
        run: |
          pip install finvizfinance yfinance openpyxl pandas

      - name: Calcola giorno settimana
        id: day
        run: echo "day=$(date -u +%w)" >> $GITHUB_OUTPUT

      - name: Run Finviz Gapper
        run: python script1_finviz.py

      - name: Run Finviz Gainers
        run: python D2_script1_gainfinviz.py

      - name: Intraday STANDARD
        if: ${{ contains(fromJson('[2,3,4,5,6]'), steps.day.outputs.day) }}
        run: python script2_yfinance_1m.py

      - name: Aggregazione STANDARD
        if: ${{ contains(fromJson('[2,3,4,5,6]'), steps.day.outputs.day) }}
        run: python script4_aggrega_bk25112025.py

      - name: Intraday D2 (gainers)
        if: ${{ contains(fromJson('[2,3,4,5,6]'), steps.day.outputs.day) }}
        run: python D2_script2_yfinance_1m.py

      - name: Aggregazione D2 (gainers)
        if: ${{ contains(fromJson('[2,3,4,5,6]'), steps.day.outputs.day) }}
        run: python D2_script3_aggrega.py

      - name: Commit output
        run: |
          git config --global user.name "bocchinofr"
          git config --global user.email "bocchinofr@gmail.com"
          git add output/
          git commit -m "📊 Full pipeline output $(date -u)" || echo "Nothing to commit"
          git push

      - name: Install rclone
        run: |
          sudo apt-get update
          sudo apt-get install -y rclone

      - name: Configure rclone
        run: |
          mkdir -p ~/.config/rclone
          echo '${{ secrets.RCLONE_CONF }}' > ~/.config/rclone/rclone.conf

      - name: Upload to Google Drive (solo file odierni)
        run: |
          DATE=$(date -u +'%Y-%m-%d')
          echo "📅 Caricamento solo file con data: ${DATE}"
          
          mkdir -p temp_upload/intraday
          mkdir -p temp_upload/output
          
          # File intraday
          if [ -d "output/intraday" ]; then
            find output/intraday -type f -name "*${DATE}*" -exec cp {} temp_upload/intraday/ \;
            COUNT=$(ls temp_upload/intraday/ 2>/dev/null | wc -l)
            echo "✅ File intraday da caricare: $COUNT"
          fi
          
          # File output principali
          if [ -d "output" ]; then
            find output -maxdepth 1 -type f \( -name "tickers_*${DATE}*.csv" -o -name "gainers_*${DATE}*.csv" \) -exec cp {} temp_upload/output/ \;
            COUNT=$(ls temp_upload/output/ 2>/dev/null | wc -l)
            echo "✅ File output da caricare: $COUNT"
          fi
          
          # Upload
          if [ "$(ls -A temp_upload/intraday 2>/dev/null)" ] || [ "$(ls -A temp_upload/output 2>/dev/null)" ]; then
            rclone copy "temp_upload/intraday" "gdrive:Estrazioni finiviz yfinance/intraday" -v
            rclone copy "temp_upload/output" "gdrive:Estrazioni finiviz yfinance/output" -v
            echo "✅ Upload completato"
          else
            echo "⚠️ Nessun file trovato per ${DATE}"
          fi
          
          rm -rf temp_upload

      - name: Trigger Apps Script
        run: |
          curl -X POST "${{ secrets.APPS_SCRIPT_URL }}" \
          -H "Content-Type: application/json" \
          -d '{"event":"github_done"}'

      - name: Mark ready
        run: |
          echo "done $(date -u)" > output/_READY.txt
          git add output/_READY.txt
          git commit -m "ready flag" || echo "no changes"
          git push