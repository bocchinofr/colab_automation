name: Full Intraday Pipeline (Finviz → Intraday → Aggregation → Drive)

on:
  schedule:
    - cron: '17 3 * * *'  # ogni giorno, orario NON round per evitare congestione
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # SETUP
      # =========================
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12

      - name: Install dependencies
        run: |
          pip install finvizfinance yfinance openpyxl pandas

      # =========================
      # GIORNO SETTIMANA (UTC)
      # =========================
      - name: Calcola giorno settimana
        id: day
        run: echo "day=$(date -u +%w)" >> $GITHUB_OUTPUT

      # =========================
      # STEP 1 — FINVIZ STANDARD (gap)
      # =========================
      - name: Run Finviz Gapper
        run: python script1_finviz.py

      # =========================
      # STEP 1b — FINVIZ D2 (gainers)
      # =========================
      - name: Run Finviz Gainers
        run: python D2_script1_gainfinviz.py

      # =========================
      # STEP 2 — INTRADAY STANDARD (gap)
      # Martedì → Sabato (2–6)
      # =========================
      - name: Intraday STANDARD
        if: ${{ contains(fromJson('[2,3,4,5,6]'), steps.day.outputs.day) }}
        run: python script2_yfinance_1m.py

      - name: Aggregazione STANDARD
        if: ${{ contains(fromJson('[2,3,4,5,6]'), steps.day.outputs.day) }}
        run: python script4_aggrega_bk25112025.py

      # =========================
      # STEP 3 — INTRADAY D2 (gainers)
      # Martedì → Sabato (2–6) - stessa schedulazione dello standard
      # =========================
      - name: Intraday D2 (gainers)
        if: ${{ contains(fromJson('[2,3,4,5,6]'), steps.day.outputs.day) }}
        run: python D2_script2_yfinance_1m.py

      - name: Aggregazione D2 (gainers)
        if: ${{ contains(fromJson('[2,3,4,5,6]'), steps.day.outputs.day) }}
        run: python D2_script3_aggrega.py

      # =========================
      # STEP 4 — COMMIT OUTPUT
      # =========================
      - name: Commit output
        run: |
          git config --global user.name "bocchinofr"
          git config --global user.email "bocchinofr@gmail.com"
          git add output/
          git commit -m "📊 Full pipeline output $(date -u)" || echo "Nothing to commit"
          git push

      # =========================
      # STEP 5 — UPLOAD GOOGLE DRIVE
      # =========================
      - name: Install rclone
        run: |
          sudo apt-get update
          sudo apt-get install -y rclone

      - name: Configure rclone
        run: |
          mkdir -p ~/.config/rclone
          echo '${{ secrets.RCLONE_CONF }}' > ~/.config/rclone/rclone.conf

      - name: Upload to Google Drive
        run: |
          DATE=$(date +'%Y-%m-%d')
          echo "Uploading files for ${DATE}..."
          rclone copy "output/intraday" "gdrive:Estrazioni finiviz yfinance/intraday" \
            --create-empty-src-dirs -v
          rclone copy "output" "gdrive:Estrazioni finiviz yfinance/output" \
            --include "tickers_*.csv" \
            --include "gainers_*.csv" \
            --create-empty-src-dirs -v

      # =========================
      # STEP 6 — TRIGGER PER APPS SCRIPT
      # =========================
      - name: Trigger Apps Script
        run: |
          curl -X POST "${{ secrets.APPS_SCRIPT_URL }}" \
          -H "Content-Type: application/json" \
          -d '{"event":"github_done"}'

      # =========================
      # STEP 7 — READY FLAG (FONDAMENTALE)
      # =========================
      - name: Mark ready
        run: |
          echo "done $(date -u)" > output/_READY.txt
          git add output/_READY.txt
          git commit -m "ready flag" || echo "no changes"
          git push